<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Авто изпит (ДАИ)</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2563eb">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Авто ДАИ">
<link rel="apple-touch-icon" href="icons/icon-192.png">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f8fa;--card:#fff;--primary:#2563eb;--pdk:#1d4ed8;
  --ok:#16a34a;--err:#dc2626;--text:#111827;--muted:#6b7280;
  --border:#e5e7eb;--r:12px
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:16px}
.wrap{max-width:640px;margin:0 auto}
h1{font-size:1.4rem;font-weight:700;text-align:center;margin-bottom:4px}
.sub{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:20px}
.screen{display:none}.screen.active{display:block}

/* MODULE GRID */
.mgrid{display:grid;gap:10px;margin-bottom:12px}
.mbtn{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:14px 16px;cursor:pointer;text-align:left;transition:border-color .15s;width:100%}
.mbtn:hover{border-color:var(--primary)}
.mbtn-name{font-weight:600;font-size:.95rem}
.mbtn-count{font-size:.78rem;color:var(--muted);margin-top:2px}
.btn-all{background:var(--primary);color:#fff;border:none;border-radius:var(--r);padding:14px;width:100%;cursor:pointer;font-size:.95rem;font-weight:600;margin-top:4px}
.btn-all:hover{background:var(--pdk)}

/* MODE SCREEN */
.mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.mcard{background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:20px 12px;cursor:pointer;text-align:center;transition:all .15s}
.mcard:hover{border-color:var(--primary);box-shadow:0 2px 8px rgba(37,99,235,.12)}
.mcard-icon{font-size:2rem;margin-bottom:8px}
.mcard-name{font-weight:600;font-size:.95rem}
.mcard-desc{font-size:.78rem;color:var(--muted);margin-top:3px}
.stats-row{display:flex;gap:10px;margin-bottom:12px}
.stat{flex:1;background:var(--card);border-radius:var(--r);padding:12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.stat-n{font-size:1.5rem;font-weight:700}
.stat-n.g{color:var(--ok)}.stat-n.r{color:var(--err)}
.stat-l{font-size:.72rem;color:var(--muted);margin-top:2px}
.btn-reset{width:100%;padding:11px;border:2px solid var(--border);background:var(--card);border-radius:8px;cursor:pointer;font-size:.88rem;color:var(--muted);font-weight:600}
.btn-reset:hover{border-color:var(--err);color:var(--err)}

/* PROGRESS BAR */
.pbar-wrap{background:var(--border);border-radius:999px;height:6px;margin-bottom:6px}
.pbar{background:var(--primary);height:100%;border-radius:999px;transition:width .3s}
.pbar-row{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:18px}

/* QUESTION CARD */
.qcard{background:var(--card);border-radius:var(--r);padding:22px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.qtag{font-size:.68rem;color:var(--primary);font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.qtext{font-size:1rem;font-weight:600;line-height:1.55;margin-bottom:18px}
.opts{display:grid;gap:9px}
.opt{background:var(--bg);border:2px solid var(--border);border-radius:8px;padding:12px 14px;cursor:pointer;text-align:left;font-size:.93rem;line-height:1.4;transition:all .15s;width:100%}
.opt:hover:not(:disabled){border-color:var(--primary);background:#eff6ff}
.opt.ok{border-color:var(--ok);background:#f0fdf4;color:#15803d;font-weight:600}
.opt.err{border-color:var(--err);background:#fef2f2;color:#b91c1c}
.opt:disabled{cursor:default}
.nav-next{margin-bottom:12px}
.btn-next{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:600}
.btn-next:hover{background:var(--pdk)}

/* FLASHCARD */
.fc-qcard{background:var(--card);border-radius:var(--r);padding:20px 22px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.fc-flip{cursor:pointer;perspective:1000px;margin-bottom:12px;min-height:160px}
.fc-inner{position:relative;transform-style:preserve-3d;transition:transform .45s;min-height:160px}
.fc-flip.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;width:100%;min-height:160px;backface-visibility:hidden;border-radius:var(--r);padding:22px;display:flex;flex-direction:column;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.fc-front{background:var(--card);align-items:center}
.fc-back{background:#eff6ff;border:2px solid var(--primary);transform:rotateY(180deg)}
.fc-hint{font-size:.8rem;color:var(--muted);text-align:center;margin-top:10px}
.fc-tap{font-size:1rem;font-weight:600;color:var(--muted)}
.fc-answer{font-size:1rem;font-weight:600;color:var(--pdk);line-height:1.5}
.fc-ans-label{font-size:.7rem;color:var(--primary);font-weight:700;text-transform:uppercase;margin-bottom:8px}
.fc-btns{display:flex;gap:10px;margin-bottom:14px}
.fc-btns button{flex:1;padding:13px;border:none;border-radius:8px;cursor:pointer;font-size:.93rem;font-weight:600}
.fc-no{background:#fee2e2;color:var(--err)}
.fc-yes{background:#dcfce7;color:var(--ok)}

/* BACK BUTTON */
.btn-back{background:none;border:2px solid var(--border);color:var(--muted);font-size:.84rem;padding:8px 14px;border-radius:8px;cursor:pointer;margin-bottom:16px;display:inline-block}
.btn-back:hover{border-color:var(--primary);color:var(--primary)}

/* COMPLETE */
.complete{background:var(--card);border-radius:var(--r);padding:32px 24px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.c-emoji{font-size:3rem;margin-bottom:10px}
.c-title{font-size:1.25rem;font-weight:700;margin-bottom:6px}
.c-score{font-size:2.2rem;font-weight:700;color:var(--primary);margin:12px 0}
.c-detail{color:var(--muted);font-size:.88rem;margin-bottom:22px}
.btn-restart{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:600;margin-bottom:10px}
.btn-restart:hover{background:var(--pdk)}
.btn-back2{width:100%;padding:13px;background:var(--border);color:var(--text);border:none;border-radius:8px;cursor:pointer;font-size:.93rem;font-weight:600}
</style>
</head>
<body>
<div class="wrap">

<!-- HOME -->
<div id="s-home" class="screen active">
  <h1>🗺️ Авто изпит (ДАИ)</h1>
  <p class="sub">Изберете модул за практика</p>
  <div class="mgrid" id="module-grid"></div>
  <button class="btn-all" onclick="startAll()">📚 Всички въпроси</button>
</div>

<!-- MODE -->
<div id="s-mode" class="screen">
  <button class="btn-back" onclick="show('s-home')">← Назад</button>
  <h1 id="mode-title"></h1>
  <p class="sub" id="mode-sub"></p>
  <div class="mode-grid">
    <div class="mcard" onclick="begin('mc')">
      <div class="mcard-icon">🔢</div>
      <div class="mcard-name">Множествен избор</div>
      <div class="mcard-desc">4 варианта, 1 верен</div>
    </div>
    <div class="mcard" onclick="begin('fc')">
      <div class="mcard-icon">🃏</div>
      <div class="mcard-name">Флашкарти</div>
      <div class="mcard-desc">Обърни за отговора</div>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat"><div class="stat-n g" id="s-ok">0</div><div class="stat-l">Верни</div></div>
    <div class="stat"><div class="stat-n r" id="s-err">0</div><div class="stat-l">Грешни</div></div>
    <div class="stat"><div class="stat-n" id="s-tot">0</div><div class="stat-l">Въпроси</div></div>
  </div>
  <button class="btn-reset" onclick="resetStats()">🔄 Нулирай прогреса за модула</button>
</div>

<!-- QUIZ (MC) -->
<div id="s-quiz" class="screen">
  <button class="btn-back" onclick="show('s-mode')">← Назад</button>
  <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
  <div class="pbar-row"><span id="pbar-label"></span><span id="pbar-score"></span></div>
  <div id="mc-area">
    <div class="qcard">
      <div class="qtag" id="q-tag"></div>
      <div class="qtext" id="q-text"></div>
      <div class="opts" id="q-opts"></div>
    </div>
    <div class="nav-next" id="nav-next">
      <button class="btn-next" onclick="nextQ()">Следващ →</button>
    </div>
  </div>
  <!-- FLASHCARD -->
  <div id="fc-area" style="display:none">
    <div class="fc-qcard">
      <div class="qtag" id="fc-tag"></div>
      <div class="qtext" id="fc-q"></div>
    </div>
    <!-- Typing input -->
    <div id="fc-input-area">
      <textarea id="fc-input" placeholder="Напиши отговора тук..." rows="3"
        style="width:100%;padding:12px 14px;border:2px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit;resize:vertical;background:var(--card);color:var(--text);outline:none;margin-bottom:10px"></textarea>
      <button onclick="checkFCInput()" id="fc-check-btn"
        style="width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:.95rem;font-weight:600;margin-bottom:14px">
        Провери отговора
      </button>
    </div>
    <!-- Feedback after check -->
    <div id="fc-result" style="display:none;margin-bottom:12px">
      <div id="fc-result-box" style="border-radius:var(--r);padding:16px 18px;margin-bottom:10px">
        <div id="fc-result-icon" style="font-size:1.4rem;margin-bottom:6px"></div>
        <div id="fc-result-msg" style="font-size:.9rem;font-weight:600;margin-bottom:8px"></div>
        <div style="font-size:.78rem;color:var(--muted);margin-bottom:4px">Верен отговор:</div>
        <div id="fc-ans" style="font-size:.93rem;font-weight:600;color:var(--pdk);line-height:1.5"></div>
      </div>
    </div>
    <!-- Manual flip fallback -->
    <div id="fc-flip-wrap" style="display:none">
      <div class="fc-flip" id="fc-flip" onclick="flip()">
        <div class="fc-inner">
          <div class="fc-front">
            <div class="fc-tap">👆 Натисни за отговора</div>
            <div class="fc-hint">Виж верния отговор</div>
          </div>
          <div class="fc-back">
            <div class="fc-ans-label">Верен отговор</div>
            <div class="fc-answer" id="fc-ans-flip"></div>
          </div>
        </div>
      </div>
    </div>
    <div class="fc-btns" id="fc-btns" style="display:none">
      <button class="fc-no" onclick="fcMark(false)">✗ Грешно</button>
      <button class="fc-yes" onclick="fcMark(true)">✓ Вярно</button>
    </div>
  </div>
</div>

<!-- COMPLETE -->
<div id="s-complete" class="screen">
  <div class="complete">
    <div class="c-emoji" id="c-emoji">🎉</div>
    <div class="c-title">Сесията приключи!</div>
    <div class="c-score" id="c-score"></div>
    <div class="c-detail" id="c-detail"></div>
    <button class="btn-restart" onclick="restartSession()">🔄 Опитай отново</button>
    <button class="btn-back2" onclick="show('s-mode')">← Назад към модула</button>
  </div>
</div>

</div><!-- /wrap -->
<script>
// ============================================================
// DATA
// ============================================================
// type: 'mc' = multiple choice (default), 'fc' = flashcard only
// For mc: opts[] + correct (index)
// For fc: answer (string)
const ALL = [
// ═══════════ МОДУЛ 1: ОРГАНИЗАЦИЯ ═══════════
{id:1,m:'Модул 1: Организация',q:'Минималният възраст на водачите, осъществяващи таксиметров превоз е:',o:['23 години','21 години','18 години','25 години'],c:1},
{id:2,m:'Модул 1: Организация',q:'Разрешено ли е на водач на възраст 20 години да бъде водач на лек таксиметров автомобил?',o:['да','не'],c:1},
{id:3,m:'Модул 1: Организация',q:'Водачът на лек таксиметров автомобил не трябва да е осъждан за:',o:['нарушения на ЗДП','умишлено престъпление от общ характер и да не е лишен от право да управлява МПС','административни нарушения','данъчни нарушения'],c:1},
{id:4,m:'Модул 1: Организация',q:'Удостоверението „Водач на лек таксиметров автомобил" е валидно:',o:['за цялата страна','само за общината на издаване','само за всички общини на територията на съответния област'],c:2},
{id:5,m:'Модул 1: Организация',q:'До достигане на 65-годишна възраст, удостоверението за психологическа годност трябва да е издадено от не повече от:',o:['шест месеца','три години','една година'],c:2},
{id:6,m:'Модул 1: Организация',q:'Когато Удостоверението за психологическа годност е изгубено, повредено или унищожено, водачът:',o:['е длъжен да преустанови дейността','се явява на ново психологическо изследване','може да подаде заявление за издаване на дубликат'],c:2},
{id:7,m:'Модул 1: Организация',q:'Заявление за издаване на дубликат на психологическото удостоверение се подава до:',o:['министъра на транспорта','министъра на здравеопазването','лице с удостоверение за регистрация за психологически изследвания'],c:2},
{id:8,m:'Модул 1: Организация',q:'Издаденият дубликат на Удостоверение за психологическа годност важи:',o:['за три години от датата на издаване','за шест месеца','за същия период като оригиналното удостоверение'],c:2},
{id:9,m:'Модул 1: Организация',q:'Почивката между два периода на ежедневно управление трябва да е не по-малко от:',o:['8 последователни часа','9 последователни часа','11 последователни часа'],c:2},
{id:10,m:'Модул 1: Организация',q:'Общата продължителност на ежедневното управление при таксиметров превоз не трябва да надвишава:',o:['9 часа','10 часа','12 часа'],c:2},
{id:11,m:'Модул 1: Организация',q:'След каква пауза на управление водачът трябва да направи прекъсване от най-малко 30 минути?',o:['3 часа','4,5 часа','4 часа'],c:2},
{id:12,m:'Модул 1: Организация',q:'Седмичната почивка на водачите, извършващи таксиметров превоз, е не по-малка от:',o:['24 последователни часа','30 последователни часа','50 последователни часа'],c:2},
{id:13,m:'Модул 1: Организация',q:'Разрешение за извършване на таксиметров превоз се издава от:',o:['браншова организация','министъра на транспорта','кмета на общинаta или упълномощено от него длъжностно лице'],c:2},
{id:14,m:'Модул 1: Организация',q:'Разрешение за извършване на таксиметров превоз на пътници се издава за:',o:['всеки отделен водач','браншовата организация','всеки отделен автомобил'],c:2},
{id:15,m:'Модул 1: Организация',q:'Необходимите документи за извършване на таксиметров превоз се осигуряват от:',o:['водача','браншова организация','превозвача'],c:2},
{id:16,m:'Модул 1: Организация',q:'ЕТАФП трябва да работи на:',o:['дневна и делнична тарифа','само дневна тарифа','дневна и нощна тарифа'],c:2},
{id:17,m:'Модул 1: Организация',q:'За извършване на таксиметров превоз в курортен комплекс на територията на дадена община, водачът трябва да има разрешение от:',o:['само курортния комплекс','само общинаta домакин','двете общини'],c:2},
{id:18,m:'Модул 1: Организация',q:'Лицензът за таксиметров превоз се издава за автомобил с:',o:['до 5 места без водача','до 9 места без водача','до 7 места без водача'],c:2},

// ═══════════ МОДУЛ 2: ЕКСПЛОАТАЦИЯ ═══════════
{id:20,m:'Модул 2: Експлоатация',q:'Лек таксиметров автомобил трябва да е оборудван с:',o:['ограничител на скоростта','бордови компютър','електронен таксиметров апарат с фискална памет'],c:2},
{id:21,m:'Модул 2: Експлоатация',q:'Осигуряването на медицински прегледи на водачите е задължение на:',o:['водача','контролните органи','превозвача'],c:2},
{id:22,m:'Модул 2: Експлоатация',q:'Осигуряването на ежемесечни технически проверки на таксиметровите автомобили е задължение на:',o:['водача','контролните органи','превозвача'],c:2},
{id:23,m:'Модул 2: Експлоатация',q:'При управление водачът задължително носи:',o:['само шофьорска книжка','само разрешителното','удостоверението „Водач на лек таксиметров автомобил"'],c:2},
{id:24,m:'Модул 2: Експлоатация',q:'Лекият таксиметров автомобил трябва да има:',o:['2 врати','5 врати','4 врати'],c:2},
{id:25,m:'Модул 2: Експлоатация',q:'Лек таксиметров автомобил трябва да е обозначен с:',o:['жълта лента','жълта светлина','светещ надпис „Такси" на покрива'],c:2},
{id:26,m:'Модул 2: Експлоатация',q:'При повреда на таксиметров апарат по времена превоза водачът задължително записва в пътната книжка:',o:['само датата','само километрите','точното время на влизане и показанията на километропоказателя'],c:2},
{id:27,m:'Модул 2: Експлоатация',q:'Пътните книжки с прикрепените отчети се съхраняват от:',o:['водача','таксиметровата стоянка','превозвача'],c:2},
{id:28,m:'Модул 2: Експлоатация',q:'При повреда на апарата водачът може да завърши превоза, като:',o:['превозът трябва незабавно да се прекрати','може да довезе клиента и договаря цената','може само по предварително обявен маршрут'],c:1},
{id:29,m:'Модул 2: Експлоатация',q:'Началото на всяко пътуване с лек таксиметров автомобил се записва в:',o:['дневника на водача','таксиметровия апарат','пътната книжка'],c:2},
{id:30,m:'Модул 2: Експлоатация',q:'Водачът е длъжен да откаже превоз, когато:',o:['пътникът е с домашен любимец','пътникът е бременна жена','пътникът е в нетрезво състояние и може да замърси или повреди автомобила'],c:2},
{id:31,m:'Модул 2: Експлоатация',q:'На водача е забранено да откаже превоз, когато:',o:['пътникът е с куче','пътникът е с бебешка количка','пътникът е с обемен багаж, животно, или нещо, което може да замърси автомобила'],c:1},
{id:32,m:'Модул 2: Експлоатация',q:'Почивката между два периода на ежедневно управление на водачите, извършващи таксиметров превоз, е не по-малко от:',o:['10 часа','12 часа','11 последователни часа'],c:2},

// ============================================================
// APP STATE
// ============================================================
let curMod = null;
let modKey = '';
let mode = 'mc';
let weights = {};
let queue = [];
let qIdx = 0;
let sessOk = 0;
let sessErr = 0;
let sessTotal = 0;
let fcFlipped = false;

// ============================================================
// MODULE DEFINITIONS
// ============================================================
const MODULES = [
  {key:'mod1', name:'Модул 1: Организация', filter:q=>q.m.startsWith('Модул 1')},
  {key:'mod2', name:'Модул 2: Експлоатация', filter:q=>q.m.startsWith('Модул 2')},
  {key:'mod3', name:'Модул 3: ЕТАФП', filter:q=>q.m.startsWith('Модул 3')},
  {key:'mod4', name:'Модул 4: Адм. отговорност', filter:q=>q.m.startsWith('Модул 4')},
  {key:'mod5', name:'Модул 5: Безопасност', filter:q=>q.m.startsWith('Модул 5')},
  {key:'marshruti', name:'Маршрути', filter:q=>q.m==='Маршрути'},
  {key:'addr_min', name:'Адреси: Министерства', filter:q=>q.m==='Адреси: Министерства'},
  {key:'addr_imp', name:'Адреси: Важни места', filter:q=>q.m==='Адреси: Важни места'},
  {key:'addr_hosp', name:'Адреси: Болници', filter:q=>q.m==='Адреси: Болници'},
  {key:'addr_uni', name:'Адреси: Университети', filter:q=>q.m==='Адреси: Университети'},
  {key:'addr_sport', name:'Адреси: Спортни обекти', filter:q=>q.m==='Адреси: Спортни обекти'},
];

// ============================================================
// INIT
// ============================================================
function init(){
  const grid = document.getElementById('module-grid');
  MODULES.forEach(mod=>{
    const qs = ALL.filter(mod.filter);
    const stats = getStats(mod.key);
    const btn = document.createElement('button');
    btn.className = 'mbtn';
    btn.innerHTML = `<div class="mbtn-name">${mod.name}</div>
      <div class="mbtn-count">${qs.length} въпроса${stats.total>0?' · '+stats.ok+' верни, '+stats.err+' грешни':''}</div>`;
    btn.onclick = ()=>selectModule(mod);
    grid.appendChild(btn);
  });
}

function getStats(key){
  try{
    const s = JSON.parse(localStorage.getItem('stats_'+key)||'{"ok":0,"err":0,"total":0}');
    return s;
  }catch(e){return{ok:0,err:0,total:0};}
}
function saveStats(key,ok,err,total){
  localStorage.setItem('stats_'+key,JSON.stringify({ok,err,total}));
}
function getWeights(key){
  try{return JSON.parse(localStorage.getItem('weights_'+key)||'{}');}
  catch(e){return{};}
}
function saveWeights(key,w){
  localStorage.setItem('weights_'+key,JSON.stringify(w));
}

// ============================================================
// NAVIGATION
// ============================================================
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectModule(mod){
  curMod = ALL.filter(mod.filter);
  modKey = mod.key;
  weights = getWeights(modKey);
  const stats = getStats(modKey);
  document.getElementById('mode-title').textContent = mod.name;
  document.getElementById('mode-sub').textContent = curMod.length+' въпроса';
  document.getElementById('s-ok').textContent = stats.ok;
  document.getElementById('s-err').textContent = stats.err;
  document.getElementById('s-tot').textContent = stats.total;
  show('s-mode');
}

function startAll(){
  curMod = [...ALL];
  modKey = 'all';
  weights = getWeights(modKey);
  const stats = getStats(modKey);
  document.getElementById('mode-title').textContent = 'Всички въпроси';
  document.getElementById('mode-sub').textContent = curMod.length+' въпроса';
  document.getElementById('s-ok').textContent = stats.ok;
  document.getElementById('s-err').textContent = stats.err;
  document.getElementById('s-tot').textContent = stats.total;
  show('s-mode');
}

function resetStats(){
  localStorage.removeItem('stats_'+modKey);
  localStorage.removeItem('weights_'+modKey);
  weights = {};
  document.getElementById('s-ok').textContent = '0';
  document.getElementById('s-err').textContent = '0';
  document.getElementById('s-tot').textContent = '0';
}

// ============================================================
// SESSION START
// ============================================================
function begin(m){
  mode = m;
  const allAddress = curMod.length > 0 && curMod.every(q=>q.type==='fc');
  if(allAddress) mode = 'fc';
  sessOk = 0; sessErr = 0; sessTotal = 0;
  buildQueue();
  qIdx = 0;
  show('s-quiz');
  if(mode==='mc') showMC();
  else showFC();
}

function buildQueue(){
  queue = [];
  curMod.forEach(q=>{
    const w = weights[q.id] || 1;
    const reps = Math.ceil(w);
    for(let i=0;i<reps;i++) queue.push(q);
  });
  for(let i=queue.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [queue[i],queue[j]]=[queue[j],queue[i]];
  }
  const MAX = Math.min(queue.length, curMod.length*2);
  queue = queue.slice(0, MAX);
}

function updateProgress(){
  const total = queue.length;
  const done = qIdx;
  const pct = total>0 ? Math.round(done/total*100):0;
  document.getElementById('pbar').style.width = pct+'%';
  document.getElementById('pbar-label').textContent = (done)+' / '+total;
  document.getElementById('pbar-score').textContent = '✓ '+sessOk+' · ✗ '+sessErr;
}

// ============================================================
// MULTIPLE CHOICE
// ============================================================
function showMC(){
  if(qIdx >= queue.length){ sessionDone(); return; }
  const q = queue[qIdx];

  if(q.type==='fc'){
    document.getElementById('mc-area').style.display='none';
    document.getElementById('fc-area').style.display='';
    updateProgress();
    renderFC(q);
    return;
  }

  document.getElementById('mc-area').style.display='';
  document.getElementById('fc-area').style.display='none';
  document.getElementById('q-tag').textContent = q.m;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('nav-next').style.display='none';
  updateProgress();

  const opts = document.getElementById('q-opts');
  opts.innerHTML='';
  const options = [...q.o];
  const correctText = options[q.c];
  const labels = ['А', 'Б', 'В', 'Г'];

  const shuffled = options.map((txt)=>({txt}));
  for(let i=shuffled.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]];
  }

  shuffled.forEach(({txt}, idx)=>{
    const btn = document.createElement('button');
    btn.className='opt';
    btn.textContent = labels[idx]+'. '+txt;
    btn.dataset.value = txt;
    btn.onclick = ()=>answerMC(btn, txt===correctText, opts, correctText);
    opts.appendChild(btn);
  });
}

function answerMC(btn, correct, container, correctText){
  container.querySelectorAll('.opt').forEach(b=>{
    b.disabled=true;
    if(b.dataset.value===correctText) b.classList.add('ok');
  });
  if(!correct) btn.classList.add('err');

  const q = queue[qIdx];
  if(correct){
    sessOk++;
    weights[q.id] = Math.max(0.5, (weights[q.id]||1)*0.7);
  } else {
    sessErr++;
    weights[q.id] = Math.min(5, (weights[q.id]||1)+1.5);
  }
  sessTotal++;
  saveWeights(modKey, weights);
  updateProgress();
  document.getElementById('nav-next').style.display='block';
}

// ============================================================
// FLASHCARD
// ============================================================
function showFC(){
  if(qIdx >= queue.length){ sessionDone(); return; }
  const q = queue[qIdx];
  document.getElementById('mc-area').style.display='none';
  document.getElementById('fc-area').style.display='';
  updateProgress();
  renderFC(q);
}

function renderFC(q){
  fcFlipped = false;
  document.getElementById('fc-tag').textContent = q.m;
  document.getElementById('fc-q').textContent = q.q;
  const ans = q.type==='fc' ? q.a : q.o[q.c];
  document.getElementById('fc-ans').textContent = ans;
  if(document.getElementById('fc-ans-flip'))
    document.getElementById('fc-ans-flip').textContent = ans;
  document.getElementById('fc-result').style.display = 'none';
  document.getElementById('fc-btns').style.display = 'none';
  const flip = document.getElementById('fc-flip');
  if(flip) flip.classList.remove('flipped');

  if(q.type==='fc'){
    document.getElementById('fc-input').value = '';
    document.getElementById('fc-input').disabled = false;
    document.getElementById('fc-input').style.borderColor = 'var(--border)';
    document.getElementById('fc-check-btn').style.display = 'block';
    document.getElementById('fc-input-area').style.display = 'block';
    document.getElementById('fc-flip-wrap').style.display = 'none';
    setTimeout(()=>document.getElementById('fc-input').focus(), 100);
  } else {
    document.getElementById('fc-input-area').style.display = 'none';
    document.getElementById('fc-flip-wrap').style.display = 'block';
  }
}

function checkFCInput(){
  const q = queue[qIdx];
  const ans = q.type==='fc' ? q.a : q.o[q.c];
  const userVal = document.getElementById('fc-input').value.trim();
  const correct = userVal.toLowerCase() === ans.toLowerCase();
  document.getElementById('fc-input').disabled = true;
  document.getElementById('fc-check-btn').style.display = 'none';
  const box = document.getElementById('fc-result-box');
  const icon = document.getElementById('fc-result-icon');
  const msg = document.getElementById('fc-result-msg');
  if(correct){
    box.style.background='#f0fdf4'; box.style.border='2px solid var(--ok)';
    icon.textContent='✅'; msg.style.color='var(--ok)'; msg.textContent='Верен отговор!';
    document.getElementById('fc-input').style.borderColor='var(--ok)';
  } else {
    box.style.background='#fef2f2'; box.style.border='2px solid var(--err)';
    icon.textContent='❌'; msg.style.color='var(--err)';
    msg.textContent = userVal ? 'Грешен отговор' : 'Не е въведен отговор';
    document.getElementById('fc-input').style.borderColor='var(--err)';
  }
  document.getElementById('fc-result').style.display='block';
  document.getElementById('fc-btns').style.display='flex';
}

function flip(){
  if(fcFlipped) return;
  fcFlipped = true;
  document.getElementById('fc-flip').classList.add('flipped');
  setTimeout(()=>{ document.getElementById('fc-btns').style.display='flex'; }, 300);
}

function fcMark(correct){
  const q = queue[qIdx];
  if(correct){
    sessOk++;
    weights[q.id] = Math.max(0.5,(weights[q.id]||1)*0.7);
  } else {
    sessErr++;
    weights[q.id] = Math.min(5,(weights[q.id]||1)+1.5);
  }
  sessTotal++;
  saveWeights(modKey,weights);
  qIdx++;
  updateProgress();
  if(mode==='mc') showMC();
  else showFC();
}

function nextQ(){
  qIdx++;
  if(mode==='mc') showMC();
  else showFC();
}

// ============================================================
// SESSION COMPLETE
// ============================================================
function sessionDone(){
  const pct = sessTotal>0 ? Math.round(sessOk/sessTotal*100):0;
  let emoji = pct>=80?'🎉':pct>=60?'💪':'📖';
  document.getElementById('c-emoji').textContent = emoji;
  document.getElementById('c-score').textContent = sessOk+' / '+sessTotal;
  document.getElementById('c-detail').textContent = pct+'% верни · '+sessErr+' грешни';
  const prev = getStats(modKey);
  saveStats(modKey, prev.ok+sessOk, prev.err+sessErr, prev.total+sessTotal);
  show('s-complete');
}

function restartSession(){ begin(mode); }

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('fc-input').addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey){
      var btn=document.getElementById('fc-check-btn');
      if(btn&&btn.style.display!=='none'){ e.preventDefault(); checkFCInput(); }
    }
  });
});

// Service Worker registration
if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('/taxi-exam/sw.js', {scope: '/taxi-exam/'})
      .catch(()=>{});
  });
}

init();
</script>
